<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#111827">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="Vinssa Field">
  <title>Vinssa Field App</title>
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <div id="app">
    <div id="screen-home" class="screen active">
      <header class="top-bar">
        <div class="top-bar-info">
          <span class="top-bar-greeting">Vinssa Field</span>
          <span class="top-bar-date" id="fecha-hoy"></span>
        </div>
        <div class="top-bar-user" id="user-initials">GP</div>
      </header>
      <main class="home-body">
        <div class="section-label">Registro rápido</div>
        <button class="action-card" onclick="irA('screen-form', 'visita')">
          <div class="action-icon icon-blue">V</div>
          <div>
            <div class="action-title">Nueva visita</div>
            <div class="action-sub">Registrar cliente visitado</div>
          </div>
        </button>
        <button class="action-card" onclick="irA('screen-form', 'demo')">
          <div class="action-icon icon-green">D</div>
          <div>
            <div class="action-title">Demo realizada</div>
            <div class="action-sub">Con o sin líder de línea</div>
          </div>
        </button>
        <button class="action-card" onclick="irA('screen-form', 'lead')">
          <div class="action-icon icon-amber">L</div>
          <div>
            <div class="action-title">Lead / prospecto</div>
            <div class="action-sub">Evaluación inicial</div>
          </div>
        </button>
        <button class="action-card" onclick="irA('screen-form', 'oportunidad')">
          <div class="action-icon icon-gray">O</div>
          <div>
            <div class="action-title">Actualizar oportunidad</div>
            <div class="action-sub">Cambiar etapa o datos</div>
          </div>
        </button>
      </main>
    </div>
    <div id="screen-form" class="screen"></div>
  </div>
  <script src="js/config.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
